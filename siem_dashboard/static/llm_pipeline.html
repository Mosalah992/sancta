<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Pipeline — Sancta Mapping</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --border: #1e2a38;
    --accent1: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #a8ff78;
    --accent4: #f7c948;
    --accent5: #c77dff;
    --text: #cdd9e5;
    --muted: #546678;
    --line: #1e3a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,229,255,0.015) 2px,
      rgba(0,229,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  header {
    padding: 3rem 4rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 2rem;
  }

  .title-block h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    letter-spacing: 0.08em;
    color: var(--accent1);
    line-height: 1;
    text-shadow: 0 0 40px rgba(0,229,255,0.3);
  }

  .title-block p {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .legend {
    display: flex;
    gap: 1.5rem;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tree-container {
    padding: 3rem 2rem 4rem;
    overflow-x: auto;
  }

  .tree {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    min-width: 900px;
  }

  /* ── Node styles ── */
  .node {
    position: relative;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .node:hover { transform: translateY(-2px); }

  .node-box {
    border: 1px solid;
    padding: 0.65rem 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    position: relative;
    transition: box-shadow 0.3s ease, background 0.3s ease;
    min-width: 160px;
    text-align: center;
  }

  .node-box:hover {
    box-shadow: 0 0 20px currentColor;
  }

  .node-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.5;
    display: block;
    margin-bottom: 0.2rem;
    font-family: 'DM Mono', monospace;
  }

  .node-title {
    font-weight: 500;
    font-size: 0.78rem;
  }

  /* Phase colors */
  .phase-0 .node-box { border-color: var(--accent4); color: var(--accent4); background: rgba(247,201,72,0.05); }
  .phase-1 .node-box { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,53,0.05); }
  .phase-2 .node-box { border-color: var(--accent1); color: var(--accent1); background: rgba(0,229,255,0.05); }
  .phase-3 .node-box { border-color: var(--accent3); color: var(--accent3); background: rgba(168,255,120,0.05); }
  .phase-4 .node-box { border-color: var(--accent5); color: var(--accent5); background: rgba(199,125,255,0.05); }
  .phase-5 .node-box { border-color: #ff4d6d; color: #ff4d6d; background: rgba(255,77,109,0.05); }

  /* ROOT node */
  .root .node-box {
    border-color: #fff;
    color: #fff;
    background: rgba(255,255,255,0.04);
    font-size: 1rem;
    padding: 1rem 2.5rem;
    letter-spacing: 0.1em;
    font-family: 'Bebas Neue', sans-serif;
    box-shadow: 0 0 30px rgba(255,255,255,0.1);
  }

  /* ── Connector lines ── */
  .connector-v {
    width: 1px;
    background: linear-gradient(to bottom, var(--line), var(--line));
    position: relative;
  }

  .connector-v::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    transform: translateX(-50%) rotate(45deg);
    transform-origin: center;
  }

  /* ── Row layout ── */
  .row {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 0;
    position: relative;
    width: 100%;
  }

  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Horizontal bridge line drawn with CSS */
  .h-line {
    height: 1px;
    background: var(--line);
    align-self: flex-start;
    margin-top: 0px;
  }

  /* ── Popup detail panel ── */
  .detail-panel {
    position: fixed;
    top: 50%;
    right: 2rem;
    transform: translateY(-50%);
    width: 320px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.5rem;
    z-index: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .detail-panel.visible {
    opacity: 1;
    pointer-events: all;
  }

  .detail-panel h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .detail-panel .tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 1rem;
    display: block;
  }

  .detail-panel p {
    font-size: 0.78rem;
    line-height: 1.7;
    color: var(--text);
    opacity: 0.8;
  }

  .detail-panel ul {
    margin-top: 0.75rem;
    padding-left: 1rem;
  }

  .detail-panel ul li {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
    line-height: 1.5;
  }

  .detail-close {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
  }

  /* ── SVG Tree Canvas ── */
  #tree-svg {
    width: 100%;
    overflow: visible;
    display: block;
  }

  /* pulse animation on root */
  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.1); }
    50%       { box-shadow: 0 0 40px rgba(255,255,255,0.25); }
  }

  .root .node-box { animation: pulse-border 3s ease-in-out infinite; }

  /* data flow dots */
  @keyframes flow-down {
    0%   { top: 0%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  .flow-dot {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    animation: flow-down 2s linear infinite;
    pointer-events: none;
  }

  /* entry animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .node { animation: fadeUp 0.5s ease both; }
</style>
</head>

function openPanel(id) {
  const d = DATA[id];
  if (!d) return;
  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-title').textContent = d.title;
  document.getElementById('dp-tag').textContent = d.tag;
  document.getElementById('dp-desc').textContent = d.desc;
  const list = document.getElementById('dp-list');
  let items = d.points.map(p => `<li>→ ${p}</li>`);
  if (SANCTA[id]) {
    items.push(`<li style="color:var(--accent1);margin-top:0.5rem;">▸ Sancta: ${SANCTA[id]}</li>`);
  }
  list.innerHTML = items.join('');

  // colour by phase
  const phaseColors = {
    'Phase 1': 'var(--accent4)', 'Phase 2': 'var(--accent2)',
    'Phase 3': 'var(--accent1)', 'Phase 4': 'var(--accent3)',
    'Phase 5': 'var(--accent5)', 'Phase 6': '#ff4d6d',
    'Phase 7': '#ff4d6d'
  };
  const col = Object.entries(phaseColors).find(([k]) => d.tag.includes(k));
  panel.style.borderColor = col ? col[1] : 'var(--border)';
  document.getElementById('dp-title').style.color = col ? col[1] : 'white';
  panel.classList.add('visible');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('visible');
}

document.querySelectorAll('.clickable').forEach(el => {
  el.addEventListener('click', () => openPanel(el.dataset.id));
  el.addEventListener('mouseenter', function() {
    this.style.filter = 'brightness(1.3)';
  });
  el.addEventListener('mouseleave', function() {
    this.style.filter = '';
  });
});

document.getElementById('tree-svg').addEventListener('click', e => {
  if (!e.target.closest('.clickable')) closePanel();
});
